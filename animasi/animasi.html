```html
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animasi Soft dan Elegan</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      animation: fadeSlideScaleUp 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 0.4s;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 2.5rem;
      letter-spacing: 1.2px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUpText 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 1.6s;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      text-align: center;
      color: #e0e0e0;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUpText 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 1.9s;
    }

    @keyframes fadeSlideScaleUp {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeSlideUpText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Selamat Datang di Halaman Animasi</h1>
    <p>Ini adalah contoh animasi yang soft, elegan, dan smooth menggunakan CSS murni. Konten ini muncul dengan transisi yang lembut dan menarik.</p>
  </div>
</body>
</html>
```
