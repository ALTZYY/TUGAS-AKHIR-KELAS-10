<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nooise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="background-container">
        <div class="logo-top">
            <h1>n∞ise</h1>
        </div>
        <div class="gambarutama">
            <img src="all foto/b8a3b344b345c74b433e5160aa0fcf29 1.png" alt="Deskripsi Foto">
        </div>

        <div class="login-card">
            <h2>Login</h2>
            <p class="signup-text">Don't have an account? <a href="#">Sign up here</a></p>

            <form>
                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password</a>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <p class="social-text">Login instantly using your social media</p>
            <div class="social-icons">
                <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="google"><i class="fab fa-google"></i></a>
                <a href="#" class="twitter"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
